<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://selenamonroe.com/404.html">
<title>Page Not Found — Selena Monroe</title>
<link rel="icon" type="image/png" href="Selena_Monroe_Logo_Transparent.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D0B0F; --bg2: #131018;
    --text: #E7D6BE; --text-muted: #a08870;
    --gold: #B89A6A; --gold-light: #d4b887;
    --crimson: #7A1F2B;
    --border: rgba(184,154,106,0.2); --border-strong: rgba(184,154,106,0.45);
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 18px;
    line-height: 1.75;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }

  .logo {
    height: 90px;
    width: auto;
    margin-bottom: 2rem;
    opacity: 0.7;
    filter: drop-shadow(0 0 30px rgba(184,154,106,0.15));
  }

  .error-code {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--crimson);
    margin-bottom: 1rem;
    display: block;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 400;
    color: var(--gold-light);
    line-height: 1.2;
    margin-bottom: 1rem;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    justify-content: center;
    margin: 1.25rem 0;
  }
  .divider::before, .divider::after {
    content: '';
    width: 60px;
    height: 1px;
    background: var(--border-strong);
  }
  .diamond {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--text-muted);
    font-size: 1.15rem;
    max-width: 420px;
    margin: 0 auto 2.5rem;
    line-height: 1.75;
  }

  .nav-links {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
    list-style: none;
    margin-bottom: 2.5rem;
  }

  .nav-links a {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--gold-light); }

  .btn {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.75rem 2rem;
    text-decoration: none;
    border: 1px solid var(--gold);
    color: var(--gold-light);
    background: transparent;
    transition: all 0.3s;
    display: inline-block;
  }
  .btn:hover { background: var(--gold); color: var(--bg); }
</style>
</head>
<body>

  <img src="Selena_Monroe_Logo_Transparent.png" alt="Selena Monroe" class="logo">
  <span class="error-code">404 — Page Not Found</span>
  <h1>Something slipped<br>into the dark.</h1>
  <div class="divider"><div class="diamond"></div></div>
  <p>The page you're looking for doesn't exist — or perhaps it never did. Either way, something here is waiting for you.</p>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#books">The Series</a></li>
    <li><a href="reading-order.html">Reading Order</a></li>
    <li><a href="index.html#newsletter">Newsletter</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>

  <a href="index.html" class="btn">Return Home</a>

</body>
</html>
